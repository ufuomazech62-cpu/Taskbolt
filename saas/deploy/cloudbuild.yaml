# Taskbolt SaaS - Google Cloud Build Configuration
# 
# This configuration builds and deploys the multi-tenant SaaS application to:
# - Google Cloud Run (Backend API)
# - Firebase Hosting (Frontend Static Assets - Optional)
#
# Required substitutions:
#   _REGION: GCP region (e.g., us-central1)
#   _SERVICE_NAME: Cloud Run service name (e.g., taskbolt-saas)
#   _DATABASE_INSTANCE: Cloud SQL instance connection name
#   _FIREBASE_PROJECT_ID: Firebase project ID
#
# Example command:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE_NAME=taskbolt-saas \
#     --project=your-project-id

steps:
  # =========================================================================
  # Step 1: Build the Docker image
  # =========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/taskbolt-saas/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/taskbolt-saas/${_SERVICE_NAME}:latest'
      - '-f'
      - 'saas/deploy/Dockerfile'
      - '.'
    timeout: '1200s'

  # =========================================================================
  # Step 2: Push to Artifact Registry
  # =========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/taskbolt-saas/${_SERVICE_NAME}'
    waitFor: ['build-image']

  # =========================================================================
  # Step 3: Run Database Migrations
  # =========================================================================
  - name: 'node:18'
    id: 'db-migrate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g prisma
        cd saas/prisma
        prisma migrate deploy
    env:
      - 'DATABASE_URL=${_DATABASE_URL}'
    secretEnv: ['DATABASE_URL']
    waitFor: ['-']  # Run in parallel with build

  # =========================================================================
  # Step 4: Deploy to Cloud Run
  # =========================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/taskbolt-saas/${_SERVICE_NAME}:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --add-cloudsql-instances=${_DATABASE_INSTANCE} \
          --set-env-vars="DATABASE_URL=${_DATABASE_URL}" \
          --set-env-vars="FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}" \
          --set-env-vars="TASKBOLT_PORT=8088" \
          --set-secrets="FIREBASE_CREDENTIALS=${_FIREBASE_CREDENTIALS_SECRET}" \
          --min-instances=1 \
          --max-instances=100 \
          --memory=2Gi \
          --cpu=2 \
          --timeout=300
    waitFor: ['push-image', 'db-migrate']

  # =========================================================================
  # Step 5: Deploy Frontend to Firebase Hosting (Optional)
  # =========================================================================
  # Uncomment this step if using Firebase Hosting for frontend
  # - name: 'gcr.io/${PROJECT_ID}/firebase'
  #   id: 'deploy-firebase'
  #   args: ['deploy', '--only', 'hosting']
  #   waitFor: ['build-image']

# =============================================================================
# Substitutions (defaults)
# =============================================================================
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'taskbolt-saas'
  _DATABASE_INSTANCE: ''
  _FIREBASE_PROJECT_ID: '${PROJECT_ID}'
  _FIREBASE_CREDENTIALS_SECRET: 'firebase-credentials'

# =============================================================================
# Secrets
# =============================================================================
availableSecrets:
  secretManager:
    - versionName: 'projects/${PROJECT_ID}/secrets/database-url/versions/latest'
      env: 'DATABASE_URL'

# =============================================================================
# Build Options
# =============================================================================
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# =============================================================================
# Build Timeout
# =============================================================================
timeout: '1800s'
